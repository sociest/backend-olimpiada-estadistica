version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.dev

    container_name: fastapi-dev

    ports:
      - "8000:8000"

    volumes:
      - .:/app

    environment:
      - ENV=development

    restart: always

    depends_on:
      - db

  db:
    image: postgres:15
    container_name: postgres-dev
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: olimpiadas_bd_v2
    volumes:
      # Persistencia de postgres
      - postgres_data:/var/lib/postgresql/data

      # Scripts SQL automáticos
      - ./database:/docker-entrypoint-initdb.d
volumes:
  postgres_data: