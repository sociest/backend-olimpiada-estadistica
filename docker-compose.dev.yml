version: "3.9"

services:

  db:
    image: postgres:15
    container_name: postgres-dev

    ports:
      - "5433:5432"

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: olimpiadas_bd_v2
      TZ: America/La_Paz

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database:/docker-entrypoint-initdb.d

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d olimpiadas_bd_v2"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: .
      dockerfile: Dockerfile.dev

    container_name: fastapi-dev

    ports:
      - "8000:8000"

    volumes:
      - .:/app

    environment:
      - ENV=development
      - TZ=America/La_Paz

    restart: always

    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data: